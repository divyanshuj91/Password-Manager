<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Password Manager</title>
    <meta name="description" content="Zero-knowledge encrypted password vault with TOTP authenticator">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <script>
        tailwindcss.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        vault: {
                            950: '#06080f',
                            900: '#0a0e1a',
                            800: '#111827',
                            700: '#1a1f36',
                            600: '#252b48',
                            500: '#2d3561',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #000000; color: #e8eaed; }

        /* ── TOTP circular countdown ── */
        .totp-ring {
            transform: rotate(-90deg);
        }
        .totp-ring-bg { stroke: #202124; }
        .totp-ring-fg {
            stroke: #8ab4f8;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }
        .totp-ring-fg.warning { stroke: #f28b82; }
        .totp-ring-fg.danger { stroke: #f28b82; }

        /* ── Strength meter ── */
        .strength-bar {
            height: 4px;
            border-radius: 9999px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        /* ── Fade-in animation ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease forwards; }

        /* ── Modal backdrop ── */
        .modal-backdrop {
            background: rgba(0,0,0,0.6);
        }

        /* ── Custom scrollbar ── */
        ::-webkit-scrollbar { width: 0px; }

        /* hidden utility */
        .hidden { display: none !important; }

        /* ── Entry hover ── */
        .entry-hover:active { background: #202124; }
    </style>
</head>
<body class="bg-black text-[#e8eaed]">

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- SCREEN: SIGNUP -->
    <div id="screen-signup" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="bg-[#202124] rounded-3xl p-8 w-full max-w-md fade-in">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-medium text-white mb-2">Create Your Vault</h1>
                <p class="text-[#9ca3af] text-sm">Set a master password</p>
            </div>
            <div class="space-y-4">
                <div>
                    <div class="relative">
                        <input id="signup-pw" type="password" placeholder="Master Password" class="w-full px-4 py-3 rounded-lg bg-[#303134] text-white placeholder-[#9ca3af] text-sm focus:outline-none focus:ring-1 focus:ring-[#8ab4f8]" oninput="updateStrength(this.value)">
                        <button onclick="toggleVis('signup-pw', 'signup-eye')" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#9ca3af] hover:text-white transition">
                            <i id="signup-eye" data-lucide="eye-off" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="mt-2 h-1 bg-[#303134] rounded-full overflow-hidden">
                        <div id="strength-bar" class="strength-bar bg-red-500" style="width: 0%"></div>
                    </div>
                    <p id="strength-text" class="text-xs text-[#9ca3af] mt-1">Enter a password</p>
                </div>
                <div>
                    <input id="signup-confirm" type="password" placeholder="Confirm Password" class="w-full px-4 py-3 rounded-lg bg-[#303134] text-white placeholder-[#9ca3af] text-sm focus:outline-none focus:ring-1 focus:ring-[#8ab4f8]">
                </div>
                <button id="btn-signup" onclick="doSignup()" class="w-full py-3 rounded-full bg-[#8ab4f8] text-black font-medium text-sm hover:opacity-90 transition-opacity mt-4">Create</button>
            </div>
        </div>
    </div>

    <!-- SCREEN: LOGIN -->
    <div id="screen-login" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="bg-[#202124] rounded-3xl p-8 w-full max-w-md fade-in">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-medium text-white mb-2">Unlock Vault</h1>
                <p class="text-[#9ca3af] text-sm">Enter your master password</p>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <input id="login-pw" type="password" placeholder="Master Password" class="w-full px-4 py-3 rounded-lg bg-[#303134] text-white placeholder-[#9ca3af] text-sm focus:outline-none focus:ring-1 focus:ring-[#8ab4f8]" onkeydown="if(event.key==='Enter') doLogin()">
                    <button onclick="toggleVis('login-pw', 'login-eye')" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#9ca3af] hover:text-white transition">
                        <i id="login-eye" data-lucide="eye-off" class="w-4 h-4"></i>
                    </button>
                </div>
                <p id="login-error" class="text-[#f28b82] text-xs hidden"></p>
                <button id="btn-login" onclick="doLogin()" class="w-full py-3 rounded-full bg-[#8ab4f8] text-black font-medium text-sm hover:opacity-90 transition-opacity mt-2">Unlock</button>
            </div>
        </div>
    </div>

    <!-- SCREEN: DASHBOARD -->
    <div id="screen-dashboard" class="hidden min-h-screen flex flex-col relative pb-32">
        <header class="sticky top-0 z-40 bg-black pt-2">
            <div class="max-w-[500px] mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button class="p-2 -ml-2 text-[#e8eaed] hover:text-white rounded-full">
                        <i data-lucide="menu" class="w-[22px] h-[22px]"></i>
                    </button>
                    <h1 class="text-[20px] text-[#e8eaed]">Authenticator</h1>
                </div>
                <div class="flex items-center gap-2 text-[#e8eaed]">
                    <div class="relative">
                        <button class="p-2 rounded-full hover:bg-white/10" onclick="document.getElementById('search-input-wrap').classList.toggle('hidden'); document.getElementById('search-input').focus();">
                            <i data-lucide="search" class="w-[22px] h-[22px]"></i>
                        </button>
                        <div id="search-input-wrap" class="hidden absolute right-12 top-1/2 -translate-y-1/2">
                            <input id="search-input" type="text" placeholder="Search..." class="w-48 px-3 py-2 bg-[#202124] text-white text-sm rounded-lg focus:outline-none" oninput="filterEntries(this.value)">
                        </div>
                    </div>
                    <button class="p-1 -mr-1 rounded-full hover:bg-white/10" onclick="doLogout()">
                        <div class="w-7 h-7 rounded-full bg-[#8ab4f8] flex items-center justify-center text-black text-xs font-bold leading-none">
                            <i data-lucide="log-out" class="w-3.5 h-3.5 ml-0.5"></i>
                        </div>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-[500px] mx-auto w-full pt-2">
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-32 text-center px-4">
                <i data-lucide="shield-check" class="w-20 h-20 text-[#3c4043] mb-4"></i>
                <h2 class="text-lg font-medium text-[#e8eaed] mb-1">Looks like there are no codes yet.</h2>
                <p class="text-[#9ca3af] text-sm">Add a code by clicking the + button</p>
            </div>
            
            <div id="stats-bar" class="hidden">
                 <span id="stat-count"></span>
                 <span id="stat-totp"></span>
            </div>

            <div id="entries-grid" class="flex flex-col w-full pb-20"></div>
        </main>
        
        <button onclick="openAddModal()" class="fixed bottom-[40px] right-[40px] w-14 h-14 bg-[#202124] rounded-2xl shadow-[0_4px_12px_rgba(0,0,0,0.5)] flex items-center justify-center hover:scale-105 transition-transform z-50 group">
            <svg viewBox="0 0 36 36" class="w-7 h-7">
                <rect x="16" y="4" width="4" height="12" fill="#EA4335" class="group-hover:opacity-80 transition-opacity"/> 
                <rect x="20" y="16" width="12" height="4" fill="#FBBC04" class="group-hover:opacity-80 transition-opacity"/> 
                <rect x="16" y="20" width="4" height="12" fill="#34A853" class="group-hover:opacity-80 transition-opacity"/> 
                <rect x="4" y="16" width="12" height="4" fill="#4285F4" class="group-hover:opacity-80 transition-opacity"/> 
                <rect x="16" y="16" width="4" height="4" fill="#4285F4" />
            </svg>
        </button>
    </div>

    <!-- MODAL: ADD / VIEW -->
    <div id="modal-add" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" onclick="closeAddModal()">
        <div class="bg-[#202124] rounded-3xl p-6 w-full max-w-sm fade-in" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-[20px] font-medium text-[#e8eaed]" id="modal-add-title">Add details</h2>
            </div>

            <input type="hidden" id="view-id" value="">

            <div class="space-y-4" id="modal-add-form">
                <div class="relative">
                    <input id="add-website" type="text" placeholder="Website / App name" class="w-full px-4 py-3.5 rounded-lg bg-transparent border border-[#5f6368] focus:border-[#8ab4f8] text-[#e8eaed] placeholder-[#9ca3af] text-sm focus:outline-none">
                </div>
                <div class="relative">
                    <input id="add-username" type="text" placeholder="Username / Email" class="w-full px-4 py-3.5 rounded-lg bg-transparent border border-[#5f6368] focus:border-[#8ab4f8] text-[#e8eaed] placeholder-[#9ca3af] text-sm focus:outline-none">
                </div>
                <div class="relative">
                    <input id="add-password" type="password" placeholder="Password" class="w-full px-4 py-3.5 pr-10 rounded-lg bg-transparent border border-[#5f6368] focus:border-[#8ab4f8] text-[#e8eaed] placeholder-[#9ca3af] text-sm font-mono focus:outline-none">
                    <button onclick="generatePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8ab4f8] hover:text-blue-300">
                        <i data-lucide="wand-2" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="relative">
                    <input id="add-totp" type="text" placeholder="Key (Base32)" class="w-full px-4 py-3.5 rounded-lg bg-transparent border border-[#5f6368] focus:border-[#8ab4f8] text-[#e8eaed] placeholder-[#9ca3af] text-sm font-mono focus:outline-none">
                </div>
            </div>

            <div class="space-y-4 hidden" id="modal-view-form">
                <div>
                   <p class="text-xs text-[#9ca3af] mb-1">Website</p>
                   <p class="text-sm text-[#e8eaed]" id="view-website"></p>
                </div>
                <div>
                   <p class="text-xs text-[#9ca3af] mb-1">Username</p>
                   <p class="text-sm text-[#e8eaed]" id="view-username"></p>
                </div>
                <div>
                   <p class="text-xs text-[#9ca3af] mb-1">Password</p>
                   <div class="flex items-center justify-between bg-[#303134] rounded-lg p-3">
                       <span class="text-sm font-mono text-[#e8eaed] flex-1" id="view-password">••••••••••••</span>
                       <div class="flex items-center gap-4 pr-1">
                           <button onclick="toggleModalPassword()" class="text-[#9ca3af] hover:text-[#8ab4f8]"><i id="modal-pw-icon" data-lucide="eye" class="w-[18px] h-[18px]"></i></button>
                           <button onclick="copyModalPassword()" class="text-[#9ca3af] hover:text-[#8ab4f8]"><i data-lucide="copy" class="w-[18px] h-[18px]"></i></button>
                       </div>
                   </div>
                </div>
                <button onclick="deleteModalEntry()" class="w-full py-2.5 mt-2 rounded-full border border-[#5f6368] text-[#f28b82] font-medium text-sm hover:bg-[#f28b82]/10 transition-colors">
                    Delete Account
                </button>
            </div>

            <div class="pt-6 flex justify-end gap-3" id="modal-add-actions">
                <button onclick="closeAddModal()" class="px-5 py-2 rounded-full text-[#8ab4f8] font-medium text-sm hover:bg-blue-500/10">Cancel</button>
                <button id="modal-btn-save" onclick="doAddEntry()" class="px-5 py-2 rounded-full text-[#8ab4f8] font-medium text-sm hover:bg-blue-500/10">Save</button>
            </div>
        </div>
    </div>
    
    <!-- MODAL: QR CODE -->
    <div id="modal-qr" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" onclick="closeQrModal()">
        <div class="bg-[#202124] rounded-2xl p-6 w-full max-w-sm fade-in text-center" onclick="event.stopPropagation()">
            <h2 class="text-lg font-medium text-white mb-2">Scan QR Code</h2>
            <p id="qr-subtitle" class="text-[#9ca3af] text-sm mb-4"></p>
            <div class="flex justify-center mb-4 bg-white p-2 rounded-xl inline-block">
                <img id="qr-image" class="rounded-xl" width="200" height="200" alt="TOTP QR Code">
            </div>
            <button onclick="closeQrModal()" class="block w-full py-2 rounded-full text-[#8ab4f8] text-sm mt-2 hover:bg-blue-500/10">Close</button>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- JAVASCRIPT -->

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <script>
    // ── State ───────────────────────────────────────────────────────────────
    let token = localStorage.getItem('vault_token');
    let entriesCache = [];
    let totpIntervals = {};
    let clipboardTimeout = null;

    // ── API helper ──────────────────────────────────────────────────────────
    async function api(method, path, body = null) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const opts = { method, headers };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(path, opts);
        const data = await res.json();
        if (res.status === 401) {
            token = null;
            localStorage.removeItem('vault_token');
            showScreen('login');
            throw new Error('Session expired');
        }
        if (!res.ok) throw new Error(data.detail || 'Request failed');
        return data;
    }

    // ── Screen management ───────────────────────────────────────────────────
    function showScreen(name) {
        document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
        const el = document.getElementById(`screen-${name}`);
        if (el) el.classList.remove('hidden');
        lucide.createIcons();
    }

    // ── Toast notifications ─────────────────────────────────────────────────
    function toast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const colors = {
            success: 'from-emerald-500/20 to-emerald-500/5 border-emerald-500/30 text-emerald-300',
            error: 'from-rose-500/20 to-rose-500/5 border-rose-500/30 text-rose-300',
            info: 'from-indigo-500/20 to-indigo-500/5 border-indigo-500/30 text-indigo-300',
        };
        const icons = { success: 'check-circle-2', error: 'alert-circle', info: 'info' };

        const el = document.createElement('div');
        el.className = `pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl bg-gradient-to-r ${colors[type]}
                         border backdrop-blur-lg slide-in-right text-sm font-medium shadow-xl min-w-[280px]`;
        el.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5 shrink-0"></i><span>${message}</span>`;
        container.appendChild(el);
        lucide.createIcons({ target: el });

        setTimeout(() => {
            el.classList.remove('slide-in-right');
            el.classList.add('slide-out-right');
            setTimeout(() => el.remove(), 300);
        }, 3000);
    }

    // ── Eye toggle ──────────────────────────────────────────────────────────
    function toggleVis(inputId, iconId) {
        const inp = document.getElementById(inputId);
        const wrapper = document.getElementById(iconId);
        if (inp.type === 'password') {
            inp.type = 'text';
            wrapper.setAttribute('data-lucide', 'eye');
        } else {
            inp.type = 'password';
            wrapper.setAttribute('data-lucide', 'eye-off');
        }
        lucide.createIcons();
    }

    // ── Password strength meter ─────────────────────────────────────────────
    function updateStrength(pw) {
        const bar = document.getElementById('strength-bar');
        const txt = document.getElementById('strength-text');
        if (!pw) { bar.style.width = '0%'; txt.textContent = 'Enter a password'; return; }

        let score = 0;
        if (pw.length >= 6) score++;
        if (pw.length >= 10) score++;
        if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
        if (/\d/.test(pw)) score++;
        if (/[^a-zA-Z0-9]/.test(pw)) score++;

        const levels = [
            { w: '10%', c: '#ef4444', t: 'Very weak' },
            { w: '25%', c: '#f97316', t: 'Weak' },
            { w: '50%', c: '#f59e0b', t: 'Fair' },
            { w: '75%', c: '#22c55e', t: 'Strong' },
            { w: '100%',c: '#10b981', t: 'Very strong' },
        ];
        const lvl = levels[Math.min(score, 4)];
        bar.style.width = lvl.w;
        bar.style.background = lvl.c;
        txt.textContent = lvl.t;
        txt.style.color = lvl.c;
    }

    // ── Signup ───────────────────────────────────────────────────────────────
    async function doSignup() {
        const pw = document.getElementById('signup-pw').value.trim();
        const cf = document.getElementById('signup-confirm').value.trim();
        if (!pw) return toast('Password cannot be empty', 'error');
        if (pw.length < 6) return toast('Password must be at least 6 characters', 'error');
        if (pw !== cf) return toast('Passwords do not match', 'error');

        try {
            const data = await api('POST', '/api/register', { master_password: pw });
            token = data.token;
            localStorage.setItem('vault_token', token);
            toast('Vault created successfully!', 'success');
            showScreen('dashboard');
            loadEntries();
        } catch (e) { toast(e.message, 'error'); }
    }

    // ── Login ────────────────────────────────────────────────────────────────
    async function doLogin() {
        const pw = document.getElementById('login-pw').value.trim();
        if (!pw) return toast('Enter your master password', 'error');

        try {
            const data = await api('POST', '/api/login', { master_password: pw });
            token = data.token;
            localStorage.setItem('vault_token', token);
            document.getElementById('login-error').classList.add('hidden');
            toast('Vault unlocked!', 'success');
            showScreen('dashboard');
            loadEntries();
        } catch (e) {
            const errEl = document.getElementById('login-error');
            errEl.textContent = e.message;
            errEl.classList.remove('hidden');
            document.getElementById('login-pw').value = '';
        }
    }

    // ── Logout ───────────────────────────────────────────────────────────────
    async function doLogout() {
        try { await api('POST', '/api/logout'); } catch {}
        token = null;
        localStorage.removeItem('vault_token');
        Object.values(totpIntervals).forEach(clearInterval);
        totpIntervals = {};
        showScreen('login');
        toast('Vault locked', 'info');
    }

    // ── Load entries ─────────────────────────────────────────────────────────
    async function loadEntries() {
        try {
            const data = await api('GET', '/api/entries');
            entriesCache = data.entries;
            renderEntries(entriesCache);
        } catch (e) { toast(e.message, 'error'); }
    }

    // ── Filter entries ───────────────────────────────────────────────────────
    function filterEntries(query) {
        const q = query.toLowerCase();
        const filtered = entriesCache.filter(e =>
            e.website.toLowerCase().includes(q) || e.username.toLowerCase().includes(q)
        );
        renderEntries(filtered);
    }

    // ── Render entries ───────────────────────────────────────────────────────
    function renderEntries(entries) {
        const grid = document.getElementById('entries-grid');
        const empty = document.getElementById('empty-state');

        // Clear TOTP intervals
        Object.values(totpIntervals).forEach(clearInterval);
        totpIntervals = {};

        // Stats
        document.getElementById('stat-count').textContent = entries.length;
        document.getElementById('stat-totp').textContent = entries.filter(e => e.has_totp).length;

        if (!entries.length) {
            grid.innerHTML = '';
            empty.classList.remove('hidden');
            return;
        }

        empty.classList.add('hidden');
        empty.classList.add('hidden');
        grid.innerHTML = entries.map((entry, i) => {
            return `
            <div class="flex items-center justify-between py-4 entry-hover w-full cursor-pointer group" onclick="openViewModal(${entry.id}, '${escapeHtml(entry.website)}', '${escapeHtml(entry.username)}')" data-id="${entry.id}">
                <div class="flex-1 pl-1">
                    <div class="text-[#9ca3af] text-[14px] mb-1">${escapeHtml(entry.website)} (${escapeHtml(entry.username)})</div>
                    ${entry.has_totp ? `
                    <div class="text-[#8ab4f8] text-[34px] tracking-[0.1em] font-sans mt-1" onclick="event.stopPropagation(); copyTotp(${entry.id})" id="totp-code-${entry.id}">------</div>
                    ` : `
                    <div class="text-[#5f6368] text-[18px] font-medium tracking-wide mt-2 mb-1">Pass🔑</div>
                    `}
                </div>
                <div class="flex items-center justify-center shrink-0 w-12">
                    ${entry.has_totp ? `
                    <div class="relative w-6 h-6 flex items-center justify-center">
                        <svg class="totp-ring w-[22px] h-[22px] absolute" viewBox="0 0 36 36">
                            <circle class="totp-ring-bg" cx="18" cy="18" r="16" fill="none" stroke-width="4"/>
                            <circle id="totp-circle-${entry.id}" class="totp-ring-fg" cx="18" cy="18" r="16" fill="none" stroke-width="4" stroke-linecap="round" stroke-dasharray="100.53" stroke-dashoffset="0"/>
                        </svg>
                        <span id="totp-time-${entry.id}" class="hidden">30</span>
                    </div>
                    ` : `
                    <i data-lucide="chevron-right" class="w-5 h-5 text-[#5f6368]"></i>
                    `}
                </div>
            </div>`;
        }).join('');

        lucide.createIcons();

        // Start TOTP countdowns
        entries.filter(e => e.has_totp).forEach(e => startTotp(e.id));
    }

    // ── TOTP countdown ───────────────────────────────────────────────────────
    async function startTotp(entryId) {
        const circumference = 100.53;
        const circle = document.getElementById(`totp-circle-${entryId}`);
        const timeEl = document.getElementById(`totp-time-${entryId}`);
        const codeEl = document.getElementById(`totp-code-${entryId}`);
        if (!circle || !timeEl || !codeEl) return;

        async function fetchCode() {
            try {
                const data = await api('GET', `/api/entries/${entryId}/totp`);
                codeEl.textContent = data.code.replace(/(.{3})/, '$1 ');
                return data.remaining;
            } catch { codeEl.textContent = '------'; return 30; }
        }

        let remaining = await fetchCode();

        function tick() {
            remaining = 30 - (Math.floor(Date.now() / 1000) % 30);
            const offset = circumference * (1 - remaining / 30);
            circle.style.strokeDashoffset = offset;
            timeEl.textContent = remaining;

            // Color coding
            circle.classList.remove('warning', 'danger');
            if (remaining <= 5) circle.classList.add('danger');
            else if (remaining <= 10) circle.classList.add('warning');

            if (remaining === 30) fetchCode();
        }

        tick();
        totpIntervals[entryId] = setInterval(tick, 1000);
    }

    // ── Extra Actions ────────────────────────────────────────────────────────
    async function copyTotp(id) {
        const codeEl = document.getElementById(`totp-code-${id}`);
        if (!codeEl || codeEl.textContent === '------') return;
        const code = codeEl.textContent.replace(/\s+/g, '');
        try {
            await navigator.clipboard.writeText(code);
            toast('TOTP copied!', 'info');
        } catch { toast('Failed to copy', 'error'); }
    }

    // ── Add/View modals logic ────────────────────────────────────────────────
    function openAddModal() {
        document.getElementById('modal-add').classList.remove('hidden');
        document.getElementById('modal-add-form').classList.remove('hidden');
        document.getElementById('modal-view-form').classList.add('hidden');
        document.getElementById('modal-btn-save').classList.remove('hidden');
        document.getElementById('modal-add-title').textContent = 'Add details';
        
        document.getElementById('add-website').value = '';
        document.getElementById('add-username').value = '';
        document.getElementById('add-password').value = '';
        document.getElementById('add-totp').value = '';
        document.getElementById('add-website').focus();
    }
    
    async function openViewModal(id, website, username) {
        document.getElementById('modal-add').classList.remove('hidden');
        document.getElementById('modal-add-form').classList.add('hidden');
        document.getElementById('modal-view-form').classList.remove('hidden');
        document.getElementById('modal-btn-save').classList.add('hidden');
        document.getElementById('modal-add-title').textContent = 'Account Info';
        
        document.getElementById('view-id').value = id;
        document.getElementById('view-website').textContent = website;
        document.getElementById('view-username').textContent = username;
        document.getElementById('view-password').textContent = '••••••••••••';
        document.getElementById('modal-pw-icon').setAttribute('data-lucide', 'eye');
        lucide.createIcons();
    }
    
    function closeAddModal() { 
        document.getElementById('modal-add').classList.add('hidden'); 
    }

    async function toggleModalPassword() {
        const id = document.getElementById('view-id').value;
        const display = document.getElementById('view-password');
        const icon = document.getElementById('modal-pw-icon');
        
        if (display.textContent !== '••••••••••••') {
            display.textContent = '••••••••••••';
            icon.setAttribute('data-lucide', 'eye');
        } else {
            try {
                const data = await api('GET', `/api/entries/${id}/password`);
                display.textContent = data.password;
                icon.setAttribute('data-lucide', 'eye-off');
            } catch (e) { toast(e.message, 'error'); }
        }
        lucide.createIcons();
    }

    async function copyModalPassword() {
        const id = document.getElementById('view-id').value;
        try {
            const data = await api('GET', `/api/entries/${id}/password`);
            await navigator.clipboard.writeText(data.password);
            toast('Password copied!', 'success');
        } catch (e) { toast(e.message, 'error'); }
    }
    
    async function deleteModalEntry() {
        const id = document.getElementById('view-id').value;
        if (!confirm('Are you sure you want to delete this account?')) return;
        try {
            await api('DELETE', `/api/entries/${id}`);
            toast('Account deleted', 'success');
            closeAddModal();
            loadEntries();
        } catch (e) { toast(e.message, 'error'); }
    }



    async function doAddEntry() {
        const website = document.getElementById('add-website').value.trim();
        const username = document.getElementById('add-username').value.trim();
        const password = document.getElementById('add-password').value.trim();
        const totpSecret = document.getElementById('add-totp').value.trim() || null;

        if (!website || !username || !password)
            return toast('Website, username, and password are required', 'error');

        try {
            await api('POST', '/api/entries', { website, username, password, totp_secret: totpSecret });
            toast('Entry saved!', 'success');
            closeAddModal();
            loadEntries();
        } catch (e) { toast(e.message, 'error'); }
    }

    // ── Password generator ───────────────────────────────────────────────────
    function generatePassword() {
        const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
        const arr = new Uint32Array(20);
        crypto.getRandomValues(arr);
        const pw = Array.from(arr, v => chars[v % chars.length]).join('');
        document.getElementById('add-password').value = pw;
    }

    // ── TOTP secret generator ────────────────────────────────────────────────
    function generateTotpSecret() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
        const arr = new Uint32Array(32);
        crypto.getRandomValues(arr);
        const secret = Array.from(arr, v => chars[v % chars.length]).join('');
        document.getElementById('add-totp').value = secret;
    }

    // ── Prompt add TOTP to existing entry ────────────────────────────────────
    async function promptAddTotp(entryId) {
        const secret = prompt('Enter TOTP Base32 secret:');
        if (!secret) return;
        try {
            await api('POST', `/api/entries/${entryId}/totp`, { secret: secret.trim() });
            toast('TOTP added!', 'success');
            loadEntries();
        } catch (e) { toast(e.message, 'error'); }
    }

    // ── Show QR modal ────────────────────────────────────────────────────────
    async function showQr(entryId) {
        try {
            const data = await api('GET', `/api/entries/${entryId}/totp/qr`);
            document.getElementById('qr-image').src = `data:image/png;base64,${data.qr}`;
            document.getElementById('qr-subtitle').textContent = `${data.issuer} — ${data.account}`;
            document.getElementById('modal-qr').classList.remove('hidden');
            lucide.createIcons();
        } catch (e) { toast(e.message, 'error'); }
    }
    function closeQrModal() { document.getElementById('modal-qr').classList.add('hidden'); }

    // ── HTML escape ──────────────────────────────────────────────────────────
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
        try {
            const status = await api('GET', '/api/status');
            if (status.logged_in) {
                showScreen('dashboard');
                loadEntries();
            } else if (status.master_exists) {
                showScreen('login');
            } else {
                showScreen('signup');
            }
        } catch {
            showScreen('signup');
        }
    }

    // Boot
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        init();
    });
    </script>
</body>
</html>
